<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Key Detection</title>
        <script type="text/javascript" src="./cornify.js"></script>
        <link rel="icon" href="https://fav.farm/🔥" />
    </head>
    <body>
        <script>
            const pressed = [];
            const secertCode = 'wyatt';

            window.addEventListener('keyup', (e) => {
                console.log(e.key);
                pressed.push(e.key);
                pressed.splice(
                    -secertCode.length - 1,
                    pressed.length - secertCode.length
                );
                if (pressed.join('').includes(secertCode)) {
                    cornify_add();
                }
                console.log(pressed);
            });
        </script>
    </body>
</html>
